<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Tabuada Interativa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Gerador de tabuada</h1>
    <main>
    <div class="container">
        <label for="numeroInput">Digite um número: </label>
        <input type="number" id="numeroInput" placeholder="Ex.: 5" required>
        <button id="gerarBotao">Gerar Tabuada</button>
        <input id="limparBotao" type="reset" value="Limpar">
    </div>
    <div id="resultadoTabuada"></div>
    </main>
    <script src = "script.js"></script>
</body>
</html>
